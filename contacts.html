<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kontakt | DP.PORTFOLIO PL</title>
    <meta name="description" content="Skontaktuj się z Dominikiem Šuškevičem. Wypełnij formularz, aby zapytać o sesje zdjęciowe, wideo lub propozycje współpracy.">
    <meta name="keywords" content="kontakt, fotograf, sesja zdjęciowa, Kowno, Litwa, portfolio, Dominik Šuškevič">
    <meta name="author" content="Dominik Šuškevič, Dominikphotofficial">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://pl.dominikphotofficial.lt/contacts.html">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pl.dominikphotofficial.lt/contacts.html">
    <meta property="og:title" content="Kontakt | DP.PORTFOLIO PL">
    <meta property="og:description" content="Skontaktuj się w sprawie profesjonalnych usług fotograficznych i wideo.">
    <meta property="og:image" content="https://iili.io/fjNLbs4.png">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://iili.io/fjNLbs4.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="preloader"><div class="loader"></div></div>
    
    <header id="main-header" class="scrolled">
        <div class="header-container">
            <div class="logo"><a href="index.html"><img src="https://iili.io/fjNLbs4.png" alt="DP.PORTFOLIO"></a></div>
            <div class="burger" id="burger-toggle"><div></div><div></div><div></div></div>
        </div>
    </header>

    <div class="nav-menu" id="nav-overlay">
        <div class="nav-links">
            <a href="index.html" class="nav-link">Prace</a>
            <a href="services.html" class="nav-link">Usługi</a>
            <a href="biography.html" class="nav-link">Biografia</a>
            <a href="about.html" class="nav-link">Informacje</a>
            <a href="contacts.html" class="nav-link active">Kontakt</a>
        </div>
    </div>
    
    <main class="container fade-in-up">
        <div class="album-intro">
            <h1>Skontaktuj się</h1>
            <div class="separator"></div>
        </div>
        
        <div class="contact-grid">
            <div class="info-card">
                <div class="info-group">
                    <span class="info-label">E-mail</span>
                    <a href="mailto:Dominikphotofficial.lt@gmail.com" class="info-value">Dominikphotofficial.lt@gmail.com</a>
                </div>
                <div class="divider"></div>
                <div class="info-group">
                    <span class="info-label">Telefon</span>
                    <a href="tel:+37062337615" class="info-value">+370 623 37615</a>
                </div>
                <div class="divider"></div>
                <div class="info-group">
                    <span class="info-label">Obszar działania</span>
                    <span class="info-value">Kowno / Święcianki (Švenčionėliai)</span>
                </div>
            </div>

            <div class="form-card">
                <h3 class="form-title">Formularz kontaktowy online</h3>
                <form action="https://formspree.io/f/mgvnbvaw" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">Imię i nazwisko</label>
                        <input type="text" id="name" name="name" required placeholder="Wpisz swoje imię i nazwisko">
                    </div>
                    <div class="form-group">
                        <label for="email">Adres e-mail</label>
                        <input type="email" id="email" name="email" required placeholder="Twój adres e-mail">
                    </div>
                    <div class="form-group">
                        <label for="style">Zainteresowany usługą</label>
                        <select id="style" name="style">
                            <option value="Retro Foto">Fotografia Retro</option>
                            <option value="Cinematic Video">Wideo Kinowe</option>
                            <option value="Fotosesija">Indywidualna sesja zdjęciowa</option>
                            <option value="Kita">Inne zapytania</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Wiadomość</label>
                        <textarea id="message" name="message" rows="5" required placeholder="Opisz swój pomysł lub zadaj pytanie..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Wyślij</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 DP.PORTFOLIO. Wszelkie prawa zastrzeżone.</p>
        <div class="lang-switcher">
            <a href="https://dominikphotofficial.lt">LT</a>
            <a href="https://en.dominikphotofficial.lt">EN</a>
            <a href="https://pl.dominikphotofficial.lt" class="active">PL</a>
            <a href="https://ru.dominikphotofficial.lt">RU</a>
            <a href="https://kr.dominikphotofficial.lt">KR</a>
        </div>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
